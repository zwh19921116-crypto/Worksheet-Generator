<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Worksheet Generator</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Math Worksheet Generator</h1>
    <p class="subtitle">Create custom math worksheets instantly</p>
  </header>

  <main>
    <section class="controls">
      <h2>Worksheet Settings</h2>

      <div class="form-group">
        <label for="module">Module</label>
        <select id="module">
          <option value="arithmetic">Arithmetic</option>
        </select>
      </div>

      <div class="form-group">
        <label for="topic">Topic</label>
        <select id="topic"></select>
      </div>

      <div class="form-group" id="timesTableGroup" style="display:none">
        <label for="timesTable">Times Table</label>
        <select id="timesTable">
          <option value="2">2 times table</option>
          <option value="3">3 times table</option>
          <option value="4">4 times table</option>
          <option value="5">5 times table</option>
          <option value="6">6 times table</option>
          <option value="7">7 times table</option>
          <option value="8">8 times table</option>
          <option value="9">9 times table</option>
          <option value="10">10 times table</option>
          <option value="11">11 times table</option>
          <option value="12">12 times table</option>
        </select>
      </div>

      <div class="form-row" id="rangeRow">
        <div class="form-group" id="rangeGroup">
          <label for="minNum">Min</label>
          <input type="number" id="minNum" value="1" min="0" max="999" />
        </div>
        <div class="form-group" id="rangeGroupMax">
          <label for="maxNum">Max</label>
          <input type="number" id="maxNum" value="12" min="1" max="999" />
        </div>
      </div>

      <div class="form-group">
        <label for="numQuestions">Number of Questions</label>
        <input type="number" id="numQuestions" value="20" min="1" max="100" />
      </div>

      <div class="form-group">
        <label for="title">Worksheet Title</label>
        <input type="text" id="title" value="Math Practice" maxlength="60" />
      </div>

      <div class="form-group">
        <label for="studentName">Student Name Line</label>
        <input type="checkbox" id="studentName" checked />
        <span>Include name &amp; date fields</span>
      </div>

      <div class="button-group">
        <button id="generateBtn" class="btn-primary">Generate Worksheet</button>
        <button id="printBtn" class="btn-secondary" disabled>Print / Save PDF</button>
      </div>
    </section>

    <div class="preview-wrapper">
      <!-- Pagination controls -->
      <div class="pagination" id="pagination" style="display:none">
        <button id="prevBtn" class="btn-page" disabled>&#8592; Prev</button>
        <span id="pageIndicator">Page 1 of 1</span>
        <button id="nextBtn" class="btn-page">Next &#8594;</button>
      </div>

      <section class="preview" id="worksheetPreview">
        <p class="placeholder">Your worksheet will appear here after you click <strong>Generate Worksheet</strong>.</p>
      </section>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
