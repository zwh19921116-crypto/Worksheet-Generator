<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Worksheet Generator</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Math Worksheet Generator</h1>
    <p class="subtitle">Create custom math worksheets instantly</p>
  </header>

  <main>
    <section class="controls">
      <h2>Worksheet Settings</h2>

      <div class="form-group">
        <label for="operation">Operation</label>
        <select id="operation">
          <option value="addition">Addition (+)</option>
          <option value="subtraction">Subtraction (−)</option>
          <option value="multiplication">Multiplication (×)</option>
          <option value="division">Division (÷)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="minNum">Min Number</label>
        <input type="number" id="minNum" value="1" min="0" max="999" />
      </div>

      <div class="form-group">
        <label for="maxNum">Max Number</label>
        <input type="number" id="maxNum" value="12" min="1" max="999" />
      </div>

      <div class="form-group">
        <label for="numQuestions">Number of Questions</label>
        <input type="number" id="numQuestions" value="20" min="1" max="100" />
      </div>

      <div class="form-group">
        <label for="title">Worksheet Title</label>
        <input type="text" id="title" value="Math Practice" maxlength="60" />
      </div>

      <div class="form-group">
        <label for="studentName">Student Name Line</label>
        <input type="checkbox" id="studentName" checked />
        <span>Include name &amp; date fields</span>
      </div>

      <div class="button-group">
        <button id="generateBtn" class="btn-primary">Generate Worksheet</button>
        <button id="printBtn" class="btn-secondary" disabled>Print / Save PDF</button>
      </div>
    </section>

    <section class="preview" id="worksheetPreview">
      <p class="placeholder">Your worksheet will appear here after you click <strong>Generate Worksheet</strong>.</p>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
